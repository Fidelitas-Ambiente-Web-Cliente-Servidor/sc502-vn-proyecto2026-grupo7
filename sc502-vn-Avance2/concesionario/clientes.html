<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — Concesionario Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVEGACIÓN -->
  <nav>
    <a class="nav-brand" href="index.html">
      <span>CD</span> CONCESIONARIO
    </a>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="motos.html">Motos</a>
      <a href="autos.html">Autos</a>
      <a href="inventario.html">Inventario</a>
      <a href="clientes.html" class="active">Clientes</a>
      <a href="reserva.html">Reservar</a>
      <a href="contacto.html">Contacto</a>
    </div>
  </nav>

  <!-- ENCABEZADO DE PÁGINA -->
  <div class="page-header">
    <span class="label">Registro</span>
    <h2>Registro de Cliente</h2>
  </div>

  <!-- CONTENIDO: formulario de registro -->
  <main class="page-content">
    <form class="form-grid">

      <!-- NOMBRE -->
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Tu nombre completo"
          required>
      </div>

      <!-- TELÉFONO -->
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input
          type="tel"
          id="telefono"
          name="telefono"
          placeholder="+506 0000 0000"
          required>
      </div>

      <!-- EMAIL -->
      <div class="form-group full">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required>
      </div>

      <!-- BOTÓN ENVIAR -->
      <div class="form-group full">
        <button class="boton" type="submit">
          Registrar Cliente
        </button>
      </div>

    </form>
  </main>

  <!-- PIE DE PÁGINA -->
  <footer>
    © 2026 Concesionario Digital — San José, Costa Rica
  </footer>

<script src="js/script.js"></script>  
</body>
</html>
